name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - uses: nicknovitski/nix-develop@v1

      - name: Nix format (alejandra)
        run: alejandra -c .

      - name: Nix lint (deadnix)
        # --no-lambda-arg: suppresses unused lambda arg warnings — needed because
        # default.nix's cleanSourceWith filter requires a `type` arg by signature
        # even though we don't use it.
        run: nix shell nixpkgs#deadnix -c deadnix --no-lambda-arg flake.nix default.nix

      - name: Python format (black)
        run: black --check --line-length=131 src/

      - name: Python imports (isort)
        run: isort --check --line-length=131 src/

      - name: Build
        run: nix build .#vtraty-pes-bot
